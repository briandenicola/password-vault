version: '3'

env:
  ENV: production

dotenv: 
  - src/passwordapp.ui/.env
  - src/passwordapp.ui/.env.{{.ENV}}
  - infrastructure/.env

vars:
  TAG: "Password Vault on Azure Functions"
  DEFAULT_REGION: canadacentral
  COSMOSDB_FREE_TIER: false
  DEPLOY_MAINTENANCE: false
  ADD_CUSTOM_DOMAIN: false 
  APP_REQUIRES_AUTHENTICATION: true

tasks:
  default:
    cmds:
    - task --list 
    
  up:
    desc: Creates the infrastructure for a {{.TAG}} environment
    dir: ./infrastructure
    cmds:
    - task: init
    - task: keys
    - task: apply
    - task: cors

  init:
    desc: Initialized Terraform
    dir: ./infrastructure
    cmds:
    - terraform init #-backend-config="subscription_id={{.CORE_SUBSCRIPTION_ID}}"
    - terraform workspace new {{.REGION}} || true
    - terraform workspace select {{.REGION}}
    vars: 
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'  

  keys:
    internal: true
    dir: ./scripts
    cmds:
    - bash ./gen-encryption-keys.sh

  cors:
    desc: Adds CORS to Azure Functions 
    dir: ./infrastructure
    cmds:
    - az functionapp cors add -g {{.RG}} -n {{.FUNCTION_NAME}} --allowed-origins {{.SWA}}
    - az functionapp cors add -g {{.RG}} -n {{.FUNCTION_NAME}} --allowed-origins {{.VUE_APP_AAD_REDIRECT_URL}}
    vars:
      FUNCTION_NAME: 
        sh: terraform output -raw FUNCTION_NAME
      RG:
        sh: terraform output -raw APP_RESOURCE_GROUP
      SWA:
        sh: terraform output -raw SWA_DEFAULT_URL

  host-key:
    desc: Displays Azure Functions Host Key
    dir: ./infrastructure
    cmds:
    - cmd: echo -e '\t➡️\033[1m\e[38;5;45mAzure Function Host Key == {{.HOST_KEY}}'
      silent: true
    vars: 
      HOST_KEY: 
        sh: terraform output -raw AZURE_FUNCTION_HOST_KEY

  apply:
    dir: ./infrastructure
    desc: Applies a Terraform plan
    env:
      # CD-5: keep encryption secrets off the command line (out of ps / shell
      # history). Terraform reads them from TF_VAR_* env instead of -var.
      TF_VAR_password_encryption_key: '{{.ENCRYPTION_KEY}}'
      TF_VAR_password_encryption_initialization_vector: '{{.ENCRYPTION_IV}}'
    cmds:
    - silent: true
      cmd: terraform apply -auto-approve -var "region={{.REGION}}" 
        -var "tags={{.TAG}}"
        -var "enable_cosmosdb_free_tier={{.COSMOSDB_FREE_TIER}}"
        -var "deploy_maintenance_infrastructure={{.DEPLOY_MAINTENANCE}}"
        -var "add_custom_domain={{.ADD_CUSTOM_DOMAIN}}"
        -var "production_ui_url={{.VUE_APP_AAD_REDIRECT_URL}}"
        -var "app_requires_authentication={{.APP_REQUIRES_AUTHENTICATION}}"
        -compact-warnings
    vars: 
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'

  refresh:
    dir: ./infrastructure
    desc: Refresh a Terraform output values
    env:
      TF_VAR_password_encryption_key: '{{.ENCRYPTION_KEY}}'
      TF_VAR_password_encryption_initialization_vector: '{{.ENCRYPTION_IV}}'
    cmds:
    - silent: true
      cmd: terraform refresh -var "region={{.REGION}}" 
        -var "tags={{.TAG}}"
        -var "enable_cosmosdb_free_tier={{.COSMOSDB_FREE_TIER}}"
        -var "deploy_maintenance_infrastructure={{.DEPLOY_MAINTENANCE}}"
        -var "add_custom_domain={{.ADD_CUSTOM_DOMAIN}}"
        -var "production_ui_url={{.VUE_APP_AAD_REDIRECT_URL}}"
        -var "app_requires_authentication={{.APP_REQUIRES_AUTHENTICATION}}"
        -compact-warnings
    vars: 
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'

  plan:
    dir: ./infrastructure
    desc: Creates a Terraform plan for review
    env:
      TF_VAR_password_encryption_key: '{{.ENCRYPTION_KEY}}'
      TF_VAR_password_encryption_initialization_vector: '{{.ENCRYPTION_IV}}'
    cmds:
    - silent: true
      cmd: terraform plan -var "region={{.REGION}}" 
        -var "tags={{.TAG}}"
        -var "enable_cosmosdb_free_tier={{.COSMOSDB_FREE_TIER}}"
        -var "deploy_maintenance_infrastructure={{.DEPLOY_MAINTENANCE}}"
        -var "production_ui_url={{.VUE_APP_AAD_REDIRECT_URL}}"
        -compact-warnings
    vars: 
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'
      
  deploy-maintenance:
    desc: Deploy backup and keepalive functions
    dir: ./src/passwordapp.maintenance
    cmds:
    - rm -rf maintenance.zip || true
    - pip install  --target=".python_packages/lib/site-packages" -r requirements.txt
    - zip -r maintenance.zip .
    - az storage copy --only-show-errors -s maintenance.zip --account-name {{.STORAGE_ACCOUNT_NAME}} --destination-container app
    vars:
      FUNCTION_NAME: 
        sh: terraform -chdir=../../infrastructure output -raw MAINTENANCE_FUNCTION_NAME
      STORAGE_ACCOUNT_NAME: 
        sh: terraform -chdir=../../infrastructure output -raw MAINTENANCE_STORAGE_ACCOUNT_NAME

  deploy-api:
    desc: Deploy application to Azure Static Web Apps
    dir: ./src/passwordapp.api
    cmds:
    - rm -rf publish
    - dotnet publish -c Release --nologo -o publish/linux 
    - cd publish/linux && zip -r vault.zip .
    - az storage copy --only-show-errors -s publish/linux/vault.zip --account-name {{.STORAGE_ACCOUNT_NAME}} --destination-container app
    vars:
      FUNCTION_NAME:
        sh: terraform -chdir=../../infrastructure output -raw FUNCTION_NAME
      STORAGE_ACCOUNT_NAME:
        sh: terraform -chdir=../../infrastructure output -raw STORAGE_ACCOUNT_NAME

  test-api:
    desc: Hit the Health Page of the API to validate
    cmds:
    - curl -vvv https://{{.FUNCTION_NAME}}.azurewebsites.net/api/passwords/healthz
    vars:
      FUNCTION_NAME:
        sh: terraform -chdir=./infrastructure output -raw FUNCTION_NAME
        
  deploy-ui:
    desc: Deploy application to Azure Static Web Apps
    dir: ./src/passwordapp.ui
    cmds:
    - cmd: |
        if [ "{{.APP_REQUIRES_AUTHENTICATION}}" = "true" ] && [ -z "{{.AAD_CLIENT_ID}}" ]; then
          echo "ERROR: AAD_CLIENT_ID is empty. Add it to infrastructure/.env (see docs/entra.md)," >&2
          echo "       or set APP_REQUIRES_AUTHENTICATION=false to deploy without Entra auth." >&2
          exit 1
        fi
      silent: true
    - cmd: echo VUE_APP_TITLE=\"Password Vault\" > .env
      silent: true
    - cmd: echo VUE_APP_REQUIRES_AUTHENTICATION={{.APP_REQUIRES_AUTHENTICATION}} >> .env
      silent: true
    - cmd: echo VUE_APP_REQUIRES_APP_INSIGHTS=true >> .env
      silent: true
    - cmd: echo VUE_APP_INSIGHTS_CONNECTION_STRING=\""{{.APP_INSIGHTS_CONNECTION_STRING}}\"" >> .env
      silent: true
    - cmd: echo VUE_APP_API_ENDPOINT=\"{{.FUNCTION_URL}}\" >> .env
      silent: true
    - cmd: echo VUE_APP_AAD_REDIRECT_URL=\"{{.AAD_REDIRECT_URL}}\" >> .env
      silent: true
    - cmd: echo VUE_APP_AAD_CLIENT_ID=\"{{.AAD_CLIENT_ID}}\" >> .env
      silent: true
    - cmd: echo VUE_APP_AAD_TENANT_ID=\"{{.AAD_TENANT_ID}}\" >> .env
      silent: true
    - cmd: echo VUE_APP_AAD_SCOPE=\"{{.AAD_SCOPE}}\" >> .env
      silent: true
    - npm install
    - npm run build
    - cmd: swa deploy ./dist --deployment-token {{.DEPLOY_TOKEN}}  --env {{.ENV}}
      silent: true
    vars:
      FUNCTION_URL:
        sh: terraform -chdir=../../infrastructure output -raw FUNCTION_URL
      APP_INSIGHTS_CONNECTION_STRING:
        sh: terraform -chdir=../../infrastructure output -raw APP_INSIGHTS_CONNECTION_STRING 
      SWA: 
        sh: terraform -chdir=../../infrastructure output -raw SWA_NAME 
      DEPLOY_TOKEN:
        sh: az staticwebapp secrets list --name {{.SWA}} --query "properties.apiKey" -o tsv
      # --- Entra/AAD values: no manual .env.production needed ---
      # Redirect URL: a custom-domain/override in VUE_APP_AAD_REDIRECT_URL (any
      # loaded .env) wins; otherwise use the Static Web App's default URL.
      AAD_REDIRECT_URL:
        sh: echo "${VUE_APP_AAD_REDIRECT_URL:-$(terraform -chdir=../../infrastructure output -raw SWA_DEFAULT_URL)}"
      # Client id of the app registration (created manually per docs/entra.md).
      # Must be provided via infrastructure/.env (AAD_CLIENT_ID) — there is no
      # Terraform/az source for it.
      AAD_CLIENT_ID:
        sh: echo "${VUE_APP_AAD_CLIENT_ID:-${AAD_CLIENT_ID:-}}"
      # Tenant id: override via env, else the signed-in az tenant.
      AAD_TENANT_ID:
        sh: echo "${VUE_APP_AAD_TENANT_ID:-${AAD_TENANT_ID:-$(az account show --query tenantId -o tsv)}}"
      # API scope/audience == the Function App URL (App ID URI).
      AAD_SCOPE:
        sh: echo "${VUE_APP_AAD_SCOPE:-$(terraform -chdir=../../infrastructure output -raw FUNCTION_URL)}"

  down:
    desc: Destroys all Azure resources and cleans up Terraform
    dir: ./infrastructure
    cmds:
    - az group list --tag Application="{{.TAG}}" --query "[].name" -o tsv | xargs -ot -n 1 az group delete -y --verbose --no-wait -n || true
    - rm -rf terraform.tfstate.d .terraform.lock.hcl .terraform terraform.tfstate terraform.tfstate.backup .terraform.tfstate.lock.info || true

  # --- MIG-2 / MIG-3: legacy v1 -> v2 (AES-GCM) data migration ---
  # Requires COSMOSDB (Cosmos connection string) exported in your shell or added to
  # infrastructure/.env. AesKey/AesIV are sourced from infrastructure/.env (ENCRYPTION_*).
  migrate:backup:
    desc: Snapshot every vault document to a timestamped JSON file
    dir: ./src/passwordapp.tools
    cmds:
    - dotnet run -- backup
    env: &migrate_env
      AesKey: '{{.ENCRYPTION_KEY}}'
      AesIV: '{{.ENCRYPTION_IV}}'
      COSMOS_DATABASE_NAME: AccountPasswords
      COSMOS_COLLECTION_NAME: Passwords

  migrate:verify:
    desc: MIG-3 — decrypt every secret and report undecryptable entries (read-only)
    dir: ./src/passwordapp.tools
    cmds:
    - dotnet run -- verify
    env: *migrate_env

  migrate:dryrun:
    desc: MIG-2 — show what would be re-encrypted to v2 (writes a backup, no changes)
    dir: ./src/passwordapp.tools
    cmds:
    - dotnet run -- migrate
    env: *migrate_env

  migrate:apply:
    desc: MIG-2 — re-encrypt legacy v1 secrets to v2 and write them back (backs up first)
    dir: ./src/passwordapp.tools
    cmds:
    - dotnet run -- migrate --apply
    env: *migrate_env
