version: '3'

env:
  ENV: production

dotenv: 
  - src/passwordapp.ui/.env
  - src/passwordapp.ui/.env.{{.ENV}}
  - infrastructure/.env

vars:
  TAG: "Password Vault on Azure Functions (New)"
  DEFAULT_REGION: southcentralus
  COSMOSDB_FREE_TIER: false
  DEPLOY_MAINTENANCE: false
  ADD_CUSTOM_DOMAIN: false 
  APP_REQUIRES_AUTHENTICATION: true

tasks:
  default:
    cmds:
    - task --list 
    
  up:
    desc: Creates the infrastructure for a {{.TAG}} environment
    dir: ./infrastructure
    cmds:
    - task: init
    - task: keys
    - task: apply
    - task: cors

  init:
    desc: Initialized Terraform
    dir: ./infrastructure
    cmds:
    - terraform init #-backend-config="subscription_id={{.CORE_SUBSCRIPTION_ID}}"
    - terraform workspace new {{.REGION}} || true
    - terraform workspace select {{.REGION}}
    vars: 
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'  

  keys:
    internal: true
    dir: ./scripts
    cmds:
    - bash ./gen-encryption-keys.sh

  cors:
    desc: Adds CORS to Azure Functions 
    dir: ./infrastructure
    cmds:
    - az functionapp cors add -g {{.RG}} -n {{.FUNCTION_NAME}} --allowed-origins {{.SWA}}
    - az functionapp cors add -g {{.RG}} -n {{.FUNCTION_NAME}} --allowed-origins {{.VUE_APP_AAD_REDIRECT_URL}}
    vars:
      FUNCTION_NAME: 
        sh: terraform output -raw FUNCTION_NAME
      RG:
        sh: terraform output -raw APP_RESOURCE_GROUP
      SWA:
        sh: terraform output -raw SWA_DEFAULT_URL

  entra:configure:
    desc: Creates or updates Entra app registrations for the API and UI
    cmds:
    - pwsh -NoProfile -ExecutionPolicy Bypass -File "{{.TASKFILE_DIR}}\scripts\configure-entra.ps1" {{.CLI_ARGS}}

  github:configure:
    desc: Creates or updates GitHub Actions variables and secrets from Terraform outputs
    cmds:
    - pwsh -NoProfile -ExecutionPolicy Bypass -File "{{.TASKFILE_DIR}}\scripts\configure-github-actions.ps1" {{.CLI_ARGS}}

  deploy:api:
    desc: Triggers the GitHub Actions API deployment workflow
    cmds:
    - pwsh -NoProfile -ExecutionPolicy Bypass -File "{{.TASKFILE_DIR}}\scripts\run-deploy-workflow.ps1" -Component api {{.CLI_ARGS}}

  deploy:ui:
    desc: Triggers the GitHub Actions UI deployment workflow
    cmds:
    - pwsh -NoProfile -ExecutionPolicy Bypass -File "{{.TASKFILE_DIR}}\scripts\run-deploy-workflow.ps1" -Component ui {{.CLI_ARGS}}

  deploy:maintenance:
    desc: Triggers the GitHub Actions maintenance deployment workflow
    cmds:
    - pwsh -NoProfile -ExecutionPolicy Bypass -File "{{.TASKFILE_DIR}}\scripts\run-deploy-workflow.ps1" -Component maintenance {{.CLI_ARGS}}

  deploy:all:
    desc: Triggers the GitHub Actions deployment workflow for all components
    cmds:
    - pwsh -NoProfile -ExecutionPolicy Bypass -File "{{.TASKFILE_DIR}}\scripts\run-deploy-workflow.ps1" -Component all {{.CLI_ARGS}}

  apply:
    dir: ./infrastructure
    desc: Applies a Terraform plan
    env:
      # CD-5: keep encryption secrets off the command line (out of ps / shell
      # history). Terraform reads them from TF_VAR_* env instead of -var.
      TF_VAR_password_encryption_key: '{{.ENCRYPTION_KEY}}'
      TF_VAR_password_encryption_initialization_vector: '{{.ENCRYPTION_IV}}'
    cmds:
    - silent: true
      cmd: terraform apply -auto-approve -var "region={{.REGION}}" 
        -var "tags={{.TAG}}"
        -var "enable_cosmosdb_free_tier={{.COSMOSDB_FREE_TIER}}"
        -var "deploy_maintenance_infrastructure={{.DEPLOY_MAINTENANCE}}"
        -var "add_custom_domain={{.ADD_CUSTOM_DOMAIN}}"
        -var "production_ui_url={{.VUE_APP_AAD_REDIRECT_URL}}"
        -var "app_requires_authentication={{.APP_REQUIRES_AUTHENTICATION}}"
        -compact-warnings
    vars: 
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'

  refresh:
    dir: ./infrastructure
    desc: Refresh a Terraform output values
    env:
      TF_VAR_password_encryption_key: '{{.ENCRYPTION_KEY}}'
      TF_VAR_password_encryption_initialization_vector: '{{.ENCRYPTION_IV}}'
    cmds:
    - silent: true
      cmd: terraform refresh -var "region={{.REGION}}" 
        -var "tags={{.TAG}}"
        -var "enable_cosmosdb_free_tier={{.COSMOSDB_FREE_TIER}}"
        -var "deploy_maintenance_infrastructure={{.DEPLOY_MAINTENANCE}}"
        -var "add_custom_domain={{.ADD_CUSTOM_DOMAIN}}"
        -var "production_ui_url={{.VUE_APP_AAD_REDIRECT_URL}}"
        -var "app_requires_authentication={{.APP_REQUIRES_AUTHENTICATION}}"
        -compact-warnings
    vars: 
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'

  plan:
    dir: ./infrastructure
    desc: Creates a Terraform plan for review
    env:
      TF_VAR_password_encryption_key: '{{.ENCRYPTION_KEY}}'
      TF_VAR_password_encryption_initialization_vector: '{{.ENCRYPTION_IV}}'
    cmds:
    - silent: true
      cmd: terraform plan -var "region={{.REGION}}" 
        -var "tags={{.TAG}}"
        -var "enable_cosmosdb_free_tier={{.COSMOSDB_FREE_TIER}}"
        -var "deploy_maintenance_infrastructure={{.DEPLOY_MAINTENANCE}}"
        -var "production_ui_url={{.VUE_APP_AAD_REDIRECT_URL}}"
        -compact-warnings
    vars: 
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'
      
  test-api:
    desc: Hit the Health Page of the API to validate
    cmds:
    - curl -vvv https://{{.FUNCTION_NAME}}.azurewebsites.net/api/passwords/healthz
    vars:
      FUNCTION_NAME:
        sh: terraform -chdir=./infrastructure output -raw FUNCTION_NAME
        
  down:
    desc: Destroys all Azure resources and cleans up Terraform
    dir: ./infrastructure
    cmds:
    - az group list --tag Application="{{.TAG}}" --query "[].name" -o tsv | xargs -ot -n 1 az group delete -y --verbose --no-wait -n || true
    - rm -rf terraform.tfstate.d .terraform.lock.hcl .terraform terraform.tfstate terraform.tfstate.backup .terraform.tfstate.lock.info || true

  # --- MIG-2 / MIG-3: legacy v1 -> v2 (AES-GCM) data migration ---
  # COSMOSDB is auto-derived from the deployed infra (Terraform output), so no
  # manual `export COSMOSDB=...` is needed. Override it by exporting COSMOSDB or
  # adding it to infrastructure/.env (e.g. to run against a backup/offline).
  # AesKey/AesIV are read from local env when present; otherwise vault-migrate
  # prompts interactively so secrets do not need to be stored in infrastructure/.env.
  migrate:backup:
    desc: Snapshot every vault document to a timestamped JSON file
    dir: ./src/passwordapp.tools
    cmds:
    - dotnet run -- backup
    vars: &migrate_vars
      COSMOSDB:
        sh: echo "${COSMOSDB:-$(terraform -chdir=../../infrastructure output -raw COSMOSDB_CONNECTION_STRING 2>/dev/null)}"
    env:
      AesKey: '{{.ENCRYPTION_KEY}}'
      AesIV: '{{.ENCRYPTION_IV}}'
      COSMOSDB: '{{.COSMOSDB}}'
      COSMOS_DATABASE_NAME: AccountPasswords
      COSMOS_COLLECTION_NAME: Passwords

  migrate:verify:
    desc: MIG-3 — decrypt every secret and report undecryptable entries (read-only)
    dir: ./src/passwordapp.tools
    cmds:
    - dotnet run -- verify
    vars: *migrate_vars
    env:
      AesKey: '{{.ENCRYPTION_KEY}}'
      AesIV: '{{.ENCRYPTION_IV}}'
      COSMOSDB: '{{.COSMOSDB}}'
      COSMOS_DATABASE_NAME: AccountPasswords
      COSMOS_COLLECTION_NAME: Passwords

  migrate:dryrun:
    desc: MIG-2 — show what would be re-encrypted to v2 (writes a backup, no changes)
    dir: ./src/passwordapp.tools
    cmds:
    - dotnet run -- migrate
    vars: *migrate_vars
    env:
      AesKey: '{{.ENCRYPTION_KEY}}'
      AesIV: '{{.ENCRYPTION_IV}}'
      COSMOSDB: '{{.COSMOSDB}}'
      COSMOS_DATABASE_NAME: AccountPasswords
      COSMOS_COLLECTION_NAME: Passwords

  migrate:apply:
    desc: MIG-2 — re-encrypt legacy v1 secrets to v2 and write them back (backs up first)
    dir: ./src/passwordapp.tools
    cmds:
    - dotnet run -- migrate --apply
    vars: *migrate_vars
    env:
      AesKey: '{{.ENCRYPTION_KEY}}'
      AesIV: '{{.ENCRYPTION_IV}}'
      COSMOSDB: '{{.COSMOSDB}}'
      COSMOS_DATABASE_NAME: AccountPasswords
      COSMOS_COLLECTION_NAME: Passwords

  migrate:import:
    desc: Restore a JSON backup into the target vault store (dry run unless --apply is passed)
    dir: ./src/passwordapp.tools
    cmds:
    - dotnet run -- import {{.CLI_ARGS}}
    vars: *migrate_vars
    env:
      AesKey: '{{.ENCRYPTION_KEY}}'
      AesIV: '{{.ENCRYPTION_IV}}'
      COSMOSDB: '{{.COSMOSDB}}'
      COSMOS_DATABASE_NAME: AccountPasswords
      COSMOS_COLLECTION_NAME: Passwords
      VAULT_DEK_BASE64: '{{.VAULT_DEK_BASE64}}'
      NEW_COSMOSDB: '{{.NEW_COSMOSDB}}'
      NEW_COSMOS_DATABASE_NAME: '{{default .COSMOS_DATABASE_NAME .NEW_COSMOS_DATABASE_NAME}}'
      NEW_COSMOS_COLLECTION_NAME: '{{default .COSMOS_COLLECTION_NAME .NEW_COSMOS_COLLECTION_NAME}}'

  migrate:verify-parity:
    desc: MIG-5 — verify count/value parity between old snapshot and new snapshot/store
    dir: ./src/passwordapp.tools
    cmds:
    - dotnet run -- verify-parity {{.CLI_ARGS}}
    vars: *migrate_vars
    env:
      AesKey: '{{.ENCRYPTION_KEY}}'
      AesIV: '{{.ENCRYPTION_IV}}'
      COSMOSDB: '{{.COSMOSDB}}'
      COSMOS_DATABASE_NAME: AccountPasswords
      COSMOS_COLLECTION_NAME: Passwords
      VAULT_DEK_BASE64: '{{.VAULT_DEK_BASE64}}'
      NEW_COSMOSDB: '{{.NEW_COSMOSDB}}'
      NEW_COSMOS_DATABASE_NAME: '{{default .COSMOS_DATABASE_NAME .NEW_COSMOS_DATABASE_NAME}}'
      NEW_COSMOS_COLLECTION_NAME: '{{default .COSMOS_COLLECTION_NAME .NEW_COSMOS_COLLECTION_NAME}}'
