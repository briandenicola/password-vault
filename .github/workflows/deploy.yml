name: Deploy

# CD-2: deploy API, UI, and the Python maintenance function. CD-3: Azure auth
# via OIDC federated credentials (no stored publish profile / SP secret).
# Infrastructure is provisioned by Task/Terraform; this workflow owns code
# deployment.
#
# Deploys are gated behind the `production` GitHub Environment — configure it to
# require a reviewer so every deploy is approved. Nothing here can run until the
# owner adds the secrets below (see docs/deploy.md).
#
#   Secrets:  AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#             AAD_CLIENT_ID (API app registration; see docs/entra.md)

on:
  workflow_dispatch:
    inputs:
      component:
        description: Which component to deploy
        type: choice
        default: all
        options: [all, api, ui, maintenance]
  push:
    branches: [main]
    paths:
      - 'src/passwordapp.api/**'
      - 'src/passwordapp.ui/**'
      - 'src/passwordapp.maintenance/**'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  ARM_USE_OIDC: 'true'
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_password_encryption_key: ${{ secrets.TF_ENCRYPTION_KEY }}
  TF_VAR_password_encryption_initialization_vector: ${{ secrets.TF_ENCRYPTION_IV }}

jobs:
  api:
    name: Deploy API
    if: >-
      github.event_name == 'push' ||
      contains(fromJSON('["all","api"]'), github.event.inputs.component)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'
      - name: Terraform init
        run: terraform -chdir=infrastructure init -input=false
      - name: Read Terraform outputs
        id: tf
        run: |
          echo "function_name=$(terraform -chdir=infrastructure output -raw FUNCTION_NAME)" >> "$GITHUB_OUTPUT"
      - name: Deploy API to Azure Functions Flex Consumption
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.tf.outputs.function_name }}
          package: src/passwordapp.api
          remote-build: true

  ui:
    name: Deploy UI
    if: >-
      github.event_name == 'push' ||
      contains(fromJSON('["all","ui"]'), github.event.inputs.component)
    runs-on: ubuntu-latest
    environment: production
    env:
      AAD_CLIENT_ID: ${{ secrets.AAD_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'
      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli
      - name: Terraform init
        run: terraform -chdir=infrastructure init -input=false
      - name: Read Terraform outputs
        id: tf
        run: |
          echo "function_url=$(terraform -chdir=infrastructure output -raw FUNCTION_URL)" >> "$GITHUB_OUTPUT"
          echo "app_insights_connection_string=$(terraform -chdir=infrastructure output -raw APP_INSIGHTS_CONNECTION_STRING)" >> "$GITHUB_OUTPUT"
          echo "swa_name=$(terraform -chdir=infrastructure output -raw SWA_NAME)" >> "$GITHUB_OUTPUT"
          echo "swa_default_url=$(terraform -chdir=infrastructure output -raw SWA_DEFAULT_URL)" >> "$GITHUB_OUTPUT"
      - name: Resolve Static Web App deployment token
        id: swa
        run: |
          token="$(az staticwebapp secrets list --name "${{ steps.tf.outputs.swa_name }}" --query properties.apiKey -o tsv)"
          echo "::add-mask::$token"
          echo "deployment_token=$token" >> "$GITHUB_OUTPUT"
      - name: Build UI
        working-directory: src/passwordapp.ui
        run: |
          {
            echo 'VUE_APP_TITLE="Password Vault"'
            echo 'VUE_APP_REQUIRES_AUTHENTICATION=true'
            echo 'VUE_APP_REQUIRES_APP_INSIGHTS=true'
            echo 'VUE_APP_INSIGHTS_CONNECTION_STRING="${{ steps.tf.outputs.app_insights_connection_string }}"'
            echo 'VUE_APP_API_ENDPOINT="${{ steps.tf.outputs.function_url }}"'
            echo 'VUE_APP_AAD_REDIRECT_URL="${{ steps.tf.outputs.swa_default_url }}"'
            echo 'VUE_APP_AAD_CLIENT_ID="${{ secrets.AAD_CLIENT_ID }}"'
            echo 'VUE_APP_AAD_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}"'
            echo 'VUE_APP_AAD_SCOPE="${{ steps.tf.outputs.function_url }}/Password.All"'
          } > .env
          npm install
          npm run build
      - name: Deploy UI
        working-directory: src/passwordapp.ui
        run: swa deploy ./dist --deployment-token "${{ steps.swa.outputs.deployment_token }}" --env production

  maintenance:
    name: Deploy maintenance function
    if: >-
      (github.event_name == 'push' &&
       contains(toJSON(github.event.commits.*.modified), 'src/passwordapp.maintenance/')) ||
      contains(fromJSON('["all","maintenance"]'), github.event.inputs.component)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.7'
      - name: Terraform init
        run: terraform -chdir=infrastructure init -input=false
      - name: Read Terraform outputs
        id: tf
        run: |
          echo "function_name=$(terraform -chdir=infrastructure output -raw MAINTENANCE_FUNCTION_NAME)" >> "$GITHUB_OUTPUT"
      - name: Deploy maintenance function to Azure Functions Flex Consumption
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.tf.outputs.function_name }}
          package: src/passwordapp.maintenance
          remote-build: true
