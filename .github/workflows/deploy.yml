name: Deploy

# CD-2: deploy API, UI, and the Python maintenance function. CD-3: Azure auth
# via OIDC federated credentials (no stored publish profile / SP secret).
# Infrastructure is provisioned by Task/Terraform; this workflow owns code
# deployment.
#
# Deploys are gated behind the `production` GitHub Environment — configure it to
# require a reviewer so every deploy is approved. Nothing here can run until the
# owner adds the secrets below (see docs/deploy.md).
#
#   Secrets:  AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#             AAD_CLIENT_ID (API app registration; see docs/entra.md)

on:
  workflow_dispatch:
    inputs:
      component:
        description: Which component to deploy
        type: choice
        default: all
        options: [all, api, ui, maintenance]
      confirm_main:
        description: Type deploy-main to manually deploy from main
        type: string
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'src/passwordapp.api/**'
      - 'src/passwordapp.ui/**'
      - 'src/passwordapp.maintenance/**'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_FUNCTIONAPP_NAME: ${{ vars.FUNCTION_NAME }}
  AZURE_MAINTENANCE_FUNCTIONAPP_NAME: ${{ vars.MAINTENANCE_FUNCTION_NAME }}
  AZURE_FUNCTIONAPP_URL: ${{ vars.FUNCTION_URL }}
  AZURE_STATIC_WEB_APP_NAME: ${{ vars.SWA_NAME }}
  AZURE_STATIC_WEB_APP_URL: ${{ vars.SWA_DEFAULT_URL }}

jobs:
  api:
    name: Deploy API
    if: >-
      github.event_name == 'push' ||
      (contains(fromJSON('["all","api"]'), github.event.inputs.component) &&
       (github.ref_name != 'main' || github.event.inputs.confirm_main == 'deploy-main'))
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish API
        run: dotnet publish src/passwordapp.api/PasswordService.csproj -c Release --nologo -o src/passwordapp.api/publish/linux
      - name: Deploy API to Azure Functions Flex Consumption
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: src/passwordapp.api/publish/linux

  ui:
    name: Deploy UI
    if: >-
      github.event_name == 'push' ||
      (contains(fromJSON('["all","ui"]'), github.event.inputs.component) &&
       (github.ref_name != 'main' || github.event.inputs.confirm_main == 'deploy-main'))
    runs-on: ubuntu-latest
    environment: production
    env:
      AAD_CLIENT_ID: ${{ secrets.AAD_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli
      - name: Resolve Static Web App deployment token
        id: swa
        run: |
          token="$(az staticwebapp secrets list --name "${{ env.AZURE_STATIC_WEB_APP_NAME }}" --query properties.apiKey -o tsv)"
          echo "::add-mask::$token"
          echo "deployment_token=$token" >> "$GITHUB_OUTPUT"
      - name: Build UI
        working-directory: src/passwordapp.ui
        run: |
          {
            echo 'VUE_APP_TITLE="Password Vault"'
            echo 'VUE_APP_REQUIRES_AUTHENTICATION=true'
            echo 'VUE_APP_REQUIRES_APP_INSIGHTS=true'
            echo 'VUE_APP_INSIGHTS_CONNECTION_STRING="${{ secrets.APP_INSIGHTS_CONNECTION_STRING }}"'
            echo 'VUE_APP_API_ENDPOINT="${{ env.AZURE_FUNCTIONAPP_URL }}"'
            echo 'VUE_APP_AAD_REDIRECT_URL="${{ env.AZURE_STATIC_WEB_APP_URL }}"'
            echo 'VUE_APP_AAD_CLIENT_ID="${{ secrets.AAD_CLIENT_ID }}"'
            echo 'VUE_APP_AAD_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}"'
            echo 'VUE_APP_AAD_SCOPE="${{ env.AZURE_FUNCTIONAPP_URL }}/Password.All"'
          } > .env
          npm install
          npm run build
      - name: Deploy UI
        working-directory: src/passwordapp.ui
        run: swa deploy ./dist --deployment-token "${{ steps.swa.outputs.deployment_token }}" --env production

  maintenance:
    name: Deploy maintenance function
    if: >-
      (github.event_name == 'push' &&
       contains(toJSON(github.event.commits.*.modified), 'src/passwordapp.maintenance/')) ||
      (contains(fromJSON('["all","maintenance"]'), github.event.inputs.component) &&
       (github.ref_name != 'main' || github.event.inputs.confirm_main == 'deploy-main'))
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy maintenance function to Azure Functions Flex Consumption
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_MAINTENANCE_FUNCTIONAPP_NAME }}
          package: src/passwordapp.maintenance
          remote-build: true
